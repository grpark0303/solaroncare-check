name: Daily Site Check  # <-- 이 부분이 왼쪽 이름을 결정합니다
on:
  schedule:
    - cron: '0 22 * * *' # 한국시간 오전 7시
  workflow_dispatch:      # <-- 이 부분이 있어야 오른쪽 'Run workflow' 버튼이 생깁니다!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
- name: Run script
        env:
          EMAIL_ID: ${{ secrets.EMAIL_ID }}
          EMAIL_PW: ${{ secrets.EMAIL_PW }}
        run: python check_site.py
